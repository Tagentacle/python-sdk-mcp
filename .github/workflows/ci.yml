name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Also checkout python-sdk-core for local path dependency
      - uses: actions/checkout@v4
        with:
          repository: Tagentacle/python-sdk-core
          path: _deps/python-sdk-core
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e _deps/python-sdk-core
      - run: pip install -e "."
      - run: pip install pytest pytest-asyncio
      - run: pytest -v

  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
